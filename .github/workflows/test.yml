name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install .

      - name: Verify packages importable
        run: python -c "import kv; import kv_mcp; print('core packages OK')"

      - name: Run MCP tests
        run: python -Bu tests/test_mcp.py

      - name: Install server dependencies
        run: pip install ".[server]"

      - name: Verify server package importable
        run: python -c "import kv_server; print('server package OK')"

      - name: Run e2e tests
        run: python -Bu tests/test_e2e.py
