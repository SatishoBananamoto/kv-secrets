name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install .

      - name: Verify packages importable
        run: python -c "import kv; import kv_mcp; print('core packages OK')"

      - name: Guard — no private code in wheel
        run: |
          pip wheel --no-deps -w /tmp/whl .
          python -c "
          import zipfile, glob, sys
          whl = glob.glob('/tmp/whl/*.whl')[0]
          entries = zipfile.ZipFile(whl).namelist()
          leaked = [e for e in entries if e.startswith('kv_server/')]
          if leaked:
              print('FATAL: private code leaked into wheel:')
              for f in leaked: print(f'  {f}')
              sys.exit(1)
          print('Guard passed: wheel contains no private code')
          "

      - name: Run MCP tests
        run: python -Bu tests/test_mcp.py
